name: Package Relay Next

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm i
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: relay-next-release
          path: release/*.zip
